name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# One concurrent Pages deployment; don't cancel in-flight production deploys.
concurrency:
  group: gh-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Pinned: newer Hugo emits deprecation warnings from the E25DX theme
  # (.Site.Data in 0.156, .Site.LanguageCode in 0.158). Bump alongside a theme update.
  HUGO_VERSION: 0.155.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with theme submodule)
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0 # full history; required by enableGitInfo

      - name: Setup Hugo (extended, pinned)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      # base_url from configure-pages is the real Pages URL (including the
      # /langgraph-docs/ project subpath), so all relURL/RelPermalink links resolve.
      - name: Build
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
